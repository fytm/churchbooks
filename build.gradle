plugins {
	id 'java'
	id 'org.springframework.boot' version '3.3.1'
	id 'io.spring.dependency-management' version '1.1.5'
}

group = 'org.churchbooks'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter'
	implementation "org.springframework.boot:spring-boot-starter-data-jpa:${springBootVersion}"
	implementation "org.springframework.boot:spring-boot-starter-web"
	implementation "com.webcohesion.ofx4j:ofx4j:${ofx4jVersion}"

	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	implementation platform("org.testcontainers:testcontainers-bom:${testContainersVersion}") //import bom
	testImplementation "org.testcontainers:testcontainers"
	testImplementation('org.testcontainers:postgresql')
	testImplementation "org.testcontainers:junit-jupiter"
	testImplementation "org.springframework.boot:spring-boot-testcontainers:${springBootVersion}"

	compileOnly "org.projectlombok:lombok:${lombokVersion}"
	annotationProcessor "org.projectlombok:lombok:${lombokVersion}"
	runtimeOnly "org.postgresql:postgresql:${postgresVersion}"
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
	useJUnitPlatform()
}
